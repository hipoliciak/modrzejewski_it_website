name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      REMOTE_WEBROOT: ${{ secrets.REMOTE_WEBROOT }}
      KEEP_BACKUPS: ${{ secrets.KEEP_BACKUPS }}
      REMOTE_ARCHIVE: /tmp/modrzejewski_it_website_deploy.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Package dist
        run: tar -czf /tmp/modrzejewski_it_website.tar.gz -C dist .

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload release archive
        run: |
          scp -P "$VPS_PORT" /tmp/modrzejewski_it_website.tar.gz "$VPS_USER@$VPS_HOST:$REMOTE_ARCHIVE"

      - name: Activate release atomically
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" /bin/bash -se -- \
            "$REMOTE_WEBROOT" "${KEEP_BACKUPS:-5}" "$REMOTE_ARCHIVE" <<'EOF'
          set -euo pipefail

          remote_webroot="$1"
          keep_backups="$2"
          remote_archive="$3"

          timestamp="$(date +%Y%m%d_%H%M%S)"
          release_dir="${remote_webroot}_new_${timestamp}"
          backup_dir="${remote_webroot}_backup_${timestamp}"

          mkdir -p "$release_dir"
          tar -xzf "$remote_archive" -C "$release_dir"

          if [[ -d "$remote_webroot" ]]; then
            mv "$remote_webroot" "$backup_dir"
          fi

          mv "$release_dir" "$remote_webroot"
          rm -f "$remote_archive"

          if command -v systemctl >/dev/null 2>&1; then
            if systemctl list-unit-files --type=service 2>/dev/null | grep -q '^nginx\.service'; then
              systemctl reload nginx || echo "[remote] nginx reload failed, skipping."
            else
              echo "[remote] nginx.service not found, skipping reload."
            fi
          fi

          if [[ "$keep_backups" =~ ^[0-9]+$ ]] && (( keep_backups >= 0 )); then
            mapfile -t backups < <(ls -1dt "${remote_webroot}_backup_"* 2>/dev/null || true)
            if (( ${#backups[@]} > keep_backups )); then
              for old in "${backups[@]:keep_backups}"; do
                rm -rf "$old"
              done
            fi
          fi
          EOF

      - name: Cleanup local archive
        run: rm -f /tmp/modrzejewski_it_website.tar.gz
